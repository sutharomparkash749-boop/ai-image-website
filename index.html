<!DOCTYPE html>
<html>
<head>
<title>AI Image Generator</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:36px;
}

input{
padding:12px;
width:260px;
border-radius:6px;
border:none;
font-size:16px;
color:black;
}

button{
padding:12px 22px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

#loader{
display:none;
margin-top:20px;
}

.images{
margin-top:30px;
}

.images img{
width:160px;
margin:10px;
border-radius:10px;
}

.gallery{
margin-top:60px;
}

.gallery img{
width:120px;
margin:8px;
border-radius:8px;
}

footer{
margin-top:60px;
color:#94a3b8;
}

</style>

</head>

<body>

<h1>AI Image Generator</h1>

<p>Type anything and generate AI images</p>

<input id="prompt" placeholder="Type image idea">

<br>

<button onclick="generate()">Generate</button>

<div id="loader">
<p>Generating images...</p>
</div>

<div class="images">

<img id="img1">
<img id="img2">
<img id="img3">
<img id="img4">

</div>

<div class="gallery">

<h2>Example Images</h2>

<img src="https://image.pollinations.ai/prompt/dragon">
<img src="https://image.pollinations.ai/prompt/robot">
<img src="https://image.pollinations.ai/prompt/future city">
<img src="https://image.pollinations.ai/prompt/lion">

</div>

<footer>

<p>Website created by <b>Liladhar Suthar</b></p>

</footer>

<script>

function generate(){

let text=document.getElementById("prompt").value;

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(text);

document.getElementById("loader").style.display="block";

document.getElementById("img1").src=url+"?1";
document.getElementById("img2").src=url+"?2";
document.getElementById("img3").src=url+"?3";
document.getElementById("img4").src=url+"?4";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);

}

</script>

</body>
</html>
